<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>附近美食</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f5; }
    #map { width: 100%; height: 55vh; }
    .header {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      color: #fff; padding: 16px 20px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; opacity: 0.9; margin-top: 4px; }
    .step-bar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 16px; background: #fff; font-size: 13px; color: #666;
      border-bottom: 1px solid #eee;
    }
    .step-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #ddd;
      display: inline-block; transition: background 0.3s;
    }
    .step-dot.done { background: #4caf50; }
    .step-dot.active { background: #ff6b35; animation: pulse 1s infinite; }
    .step-dot.fail { background: #e74c3c; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .list { padding: 12px 16px; overflow-y: auto; max-height: calc(45vh - 100px); }
    .card {
      background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex; gap: 12px; align-items: center; cursor: pointer;
      transition: transform 0.15s;
    }
    .card:active { transform: scale(0.98); }
    .card .icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .card .info { flex: 1; min-width: 0; }
    .card .name { font-size: 16px; font-weight: 600; color: #222; }
    .card .type { font-size: 12px; color: #999; margin-top: 2px; }
    .card .rating { font-size: 12px; color: #f5a623; margin-top: 2px; }
    .card .meta { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    .card .distance { font-size: 13px; color: #ff6b35; font-weight: 500; }
    .card .address { font-size: 12px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card .arrow { color: #ccc; font-size: 18px; flex-shrink: 0; }
    .empty { text-align: center; padding: 40px 20px; color: #999; }
    .empty .emoji { font-size: 48px; margin-bottom: 12px; }
    .error { text-align: center; padding: 40px 20px; color: #e74c3c; }
    .btn {
      display: inline-block; padding: 10px 24px; background: #ff6b35;
      color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
    }
    .marker-label {
      background: #fff; padding: 2px 7px; border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-size: 12px; white-space: nowrap;
      font-weight: 600; color: #ff6b35;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="title">附近美食</h1>
    <p id="subtitle">准备就绪</p>
  </div>
  <div class="step-bar">
    <span class="step-dot" id="s1"></span> 加载
    <span style="color:#ccc;">→</span>
    <span class="step-dot" id="s2"></span> 定位
    <span style="color:#ccc;">→</span>
    <span class="step-dot" id="s3"></span> 搜索
    &nbsp;|&nbsp;
    <span id="stepText" style="font-size:12px;">等待中...</span>
  </div>
  <div id="map"></div>
  <div class="list" id="list">
    <div class="empty">
      <div class="emoji">📍</div>
      <p id="listMsg">正在加载...</p>
    </div>
  </div>

  <script>
    var AMAP_KEY = '7d3a1e74b331280d4261b104d9d686b7';
    window._AMapSecurityConfig = { securityJsCode: '' };
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=7d3a1e74b331280d4261b104d9d686b7&plugin=AMap.PlaceSearch,AMap.CitySearch,AMap.Scale"></script>
  <script>
    var map, placeSearch, markers = [];
    var step1, step2, step3;

    function $(id) { return document.getElementById(id); }

    function setStep(n, state, text) {
      var dot = $('s' + n);
      dot.className = 'step-dot ' + state;
      $('stepText').textContent = text || '';
      console.log('[Step ' + n + '] ' + state + ': ' + (text || ''));
    }

    function showError(msg) {
      setStep(3, 'fail', '失败');
      $('list').innerHTML = '<div class="error"><p>❌ ' + msg + '</p><button class="btn" onclick="location.reload()" style="margin-top:12px;">重新加载</button></div>';
    }

    var cuisineIcons = {
      '中餐': '🥢', '火锅': '🫕', '烧烤': '🍖', '面馆': '🍜', '面条': '🍜',
      '小吃': '🍢', '快餐': '🍔', '汉堡': '🍔', '炸鸡': '🍗',
      '日本': '🍣', '日料': '🍣', '寿司': '🍣', '韩国': '🇰🇷', '韩式': '🇰🇷',
      '西餐': '🥩', '牛排': '🥩', '咖啡': '☕', '茶': '🍵',
      '海鲜': '🦐', '串串': '🍡', '麻辣烫': '🌶️', '自助': '🍽️',
      '面包': '🥐', '蛋糕': '🍰', '甜品': '🍰', '冰淇淋': '🍦', '披萨': '🍕',
      '饺子': '🥟', '粤菜': '🥘', '川菜': '🌶️', '湘菜': '🌶️', '新疆': '🍖',
    };

    function getIcon(type) {
      var t = type || '';
      for (var k in cuisineIcons) { if (t.indexOf(k) !== -1) return { icon: cuisineIcons[k], bg: '#fff5f0' }; }
      return { icon: '🍴', bg: '#fff5f0' };
    }

    function renderList(pois) {
      var list = $('list');
      if (!pois || pois.length === 0) {
        list.innerHTML = '<div class="empty"><div class="emoji">😔</div><p>10km 内没有搜到美食</p></div>';
        return;
      }
      for (var i = 0; i < markers.length; i++) markers[i].setMap(null);
      markers = [];
      list.innerHTML = '';

      for (var i = 0; i < pois.length; i++) {
        (function(p, idx) {
          var ig = getIcon(p.type);
          var dist = p.distance < 1000 ? p.distance + 'm' : (p.distance / 1000).toFixed(1) + 'km';

          var m = new AMap.Marker({
            position: [p.lng, p.lat],
            content: '<div class="marker-label">' + (idx + 1) + '</div>',
            offset: new AMap.Pixel(-14, -14),
          });
          m.setMap(map);
          m.on('click', function() {
            new AMap.InfoWindow({
              content: '<div style="padding:4px;"><b>' + p.name + '</b><br>' + (p.type || '美食') + '<br>⭐ ' + p.rating + ' | 📍 ' + dist + '<br><span style="color:#999;font-size:12px;">' + (p.address || '') + '</span></div>',
              offset: new AMap.Pixel(0, -30),
            }).open(map, [p.lng, p.lat]);
            map.setZoomAndCenter(16, [p.lng, p.lat]);
          });
          markers.push(m);

          var card = document.createElement('div');
          card.className = 'card';
          card.innerHTML =
            '<div class="icon" style="background:' + ig.bg + '">' + ig.icon + '</div>' +
            '<div class="info">' +
              '<div class="name">' + (idx + 1) + '. ' + p.name + '</div>' +
              '<div class="type">' + (p.type || '美食') + '</div>' +
              '<div class="rating">⭐ ' + p.rating + '</div>' +
              '<div class="meta">' +
                '<span class="distance">📍 ' + dist + '</span>' +
                '<span class="address">' + (p.address || '') + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="arrow">›</div>';
          card.addEventListener('click', function() { map.setZoomAndCenter(16, [p.lng, p.lat]); });
          list.appendChild(card);
        })(pois[i], i);
      }
    }

    function markUser(lng, lat) {
      new AMap.Marker({
        position: [lng, lat],
        content: '<div style="width:20px;height:20px;background:#4285f4;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(66,133,244,0.6);"></div>',
        offset: new AMap.Pixel(-10, -10), zIndex: 100,
      }).setMap(map);
      new AMap.Circle({
        center: [lng, lat], radius: 10000,
        strokeColor: '#ff6b35', strokeWeight: 1, strokeOpacity: 0.3,
        fillColor: '#ff6b35', fillOpacity: 0.05,
      }).setMap(map);
    }

    // ===== 搜索（15秒超时保护）=====
    function doSearch(lng, lat) {
      setStep(3, 'active', '搜索中...');
      $('subtitle').textContent = '正在搜索附近美食...';
      $('list').innerHTML = '<div class="empty"><div class="emoji">🔍</div><p>正在搜索...</p></div>';

      try {
        placeSearch = new AMap.PlaceSearch({ pageSize: 50, pageIndex: 1, extensions: 'all' });
      } catch(e) {
        console.error('PlaceSearch constructor error:', e);
        showError('搜索组件初始化失败：' + e.message);
        return;
      }

      placeSearch.setLocation([lng, lat]);
      placeSearch.setRadius(10000);

      var done = false;
      var timer = setTimeout(function() {
        if (done) return;
        done = true;
        console.log('Search timeout after 15s');
        showError('搜索超时（15秒），请确认高德 Key 白名单已添加当前域名');
      }, 15000);

      placeSearch.search('美食', function(status, result) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        console.log('Search callback:', status, result);

        if (status === 'complete' && result && result.poiList && result.poiList.pois.length > 0) {
          var pois = [];
          for (var i = 0; i < result.poiList.pois.length; i++) {
            if (result.poiList.pois[i].distance <= 10000) pois.push(result.poiList.pois[i]);
          }
          pois.sort(function(a, b) { return a.distance - b.distance; });
          pois = pois.slice(0, 50);

          if (pois.length === 0) {
            renderList([]);
            setStep(3, 'done', '无结果');
            $('subtitle').textContent = '10km 内没有找到餐厅';
            return;
          }
          renderList(pois);
          setStep(3, 'done', '完成 ' + pois.length + '家');
          $('subtitle').textContent = '周围 10km 共 ' + pois.length + ' 家美食';
          $('title').textContent = '附近美食 (' + pois.length + '家)';
        } else if (status === 'no_data') {
          renderList([]);
          setStep(3, 'done', '暂无数据');
          $('subtitle').textContent = '此区域暂无餐厅数据';
        } else {
          var errMsg = result && result.message ? result.message : (status || '未知错误');
          showError('搜索失败：' + errMsg);
        }
      });
    }

    // ===== 定位 =====
    function fallbackIP() {
      setStep(2, 'active', 'IP定位中...');
      $('subtitle').textContent = 'GPS 定位失败，尝试 IP 城市定位...';

      try {
        var cs = new AMap.CitySearch();
      } catch(e) {
        console.error('CitySearch error:', e);
        // 终极兜底
        var defLng = 116.3974, defLat = 39.9092;
        setStep(2, 'done', '使用默认位置');
        $('subtitle').textContent = '使用默认位置（北京）';
        map.setZoomAndCenter(12, [defLng, defLat]);
        markUser(defLng, defLat);
        doSearch(defLng, defLat);
        return;
      }

      cs.getLocalCity(function(status, result) {
        console.log('CitySearch callback:', status, result);
        if (status === 'complete' && result && result.info === 'OK' && result.rectangle) {
          var parts = result.rectangle.split(';')[0].split(',');
          var lng = parseFloat(parts[0]), lat = parseFloat(parts[1]);
          setStep(2, 'done', result.city || 'IP');
          $('subtitle').textContent = '已定位到 ' + (result.city || '当前城市') + '（IP 定位）';
          map.setZoomAndCenter(12, [lng, lat]);
          markUser(lng, lat);
          doSearch(lng, lat);
        } else {
          var defLng = 116.3974, defLat = 39.9092;
          setStep(2, 'done', '默认');
          $('subtitle').textContent = 'IP 定位失败，使用默认位置（北京）';
          map.setZoomAndCenter(12, [defLng, defLat]);
          markUser(defLng, defLat);
          doSearch(defLng, defLat);
        }
      });
    }

    function tryGPS() {
      if (!navigator.geolocation) {
        console.log('No geolocation API');
        fallbackIP();
        return;
      }

      setStep(2, 'active', 'GPS定位中...');
      $('subtitle').textContent = '正在获取精确位置...';
      var settled = false;

      var timer = setTimeout(function() {
        if (settled) return;
        settled = true;
        console.log('GPS timeout (8s)');
        fallbackIP();
      }, 8000);

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          if (settled) return;
          settled = true; clearTimeout(timer);
          var lng = pos.coords.longitude, lat = pos.coords.latitude;
          console.log('GPS success:', lng, lat);
          setStep(2, 'done', 'GPS');
          $('subtitle').textContent = '已精确定位';
          map.setZoomAndCenter(14, [lng, lat]);
          markUser(lng, lat);
          doSearch(lng, lat);
        },
        function(err) {
          if (settled) return;
          settled = true; clearTimeout(timer);
          console.log('GPS error:', err.code, err.message);
          fallbackIP();
        },
        { enableHighAccuracy: true, timeout: 7000, maximumAge: 120000 }
      );
    }

    // ===== 主入口 =====
    try {
      setStep(1, 'active', '初始化地图...');
      console.log('Creating AMap instance...');

      map = new AMap.Map('map', {
        zoom: 12,
        center: [116.3974, 39.9092],
        resizeEnable: true,
      });
      map.addControl(new AMap.Scale());

      setStep(1, 'done', '地图就绪');
      $('subtitle').textContent = '地图已加载，正在定位...';
      $('listMsg').textContent = '正在定位您的位置...';
      console.log('Map created, starting GPS...');

      tryGPS();
    } catch(e) {
      console.error('Init error:', e);
      setStep(1, 'fail', e.message);
      $('list').innerHTML = '<div class="error"><p>❌ 地图初始化失败</p><p style="font-size:13px;">' + e.message + '</p><p style="font-size:12px;color:#999;margin-top:4px;">请检查高德 Key 是否正确，以及域名是否在白名单中</p></div>';
    }
  </script>
</body>
</html>
