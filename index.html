<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>附近美食</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f5; }
    #map { width: 100%; height: 55vh; }
    .header {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      color: #fff; padding: 16px 20px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; opacity: 0.9; margin-top: 4px; }
    .status-bar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px; background: #fff; font-size: 13px; color: #666;
      border-bottom: 1px solid #eee;
    }
    .spinner {
      width: 16px; height: 16px; border: 2px solid #ddd;
      border-top-color: #ff6b35; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .list { padding: 12px 16px; overflow-y: auto; max-height: calc(45vh - 100px); }
    .card {
      background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex; gap: 12px; align-items: center; cursor: pointer;
      transition: transform 0.15s;
    }
    .card:active { transform: scale(0.98); }
    .card .icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .card .info { flex: 1; min-width: 0; }
    .card .name { font-size: 16px; font-weight: 600; color: #222; }
    .card .type { font-size: 12px; color: #999; margin-top: 2px; }
    .card .rating { font-size: 12px; color: #f5a623; margin-top: 2px; }
    .card .meta { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    .card .distance { font-size: 13px; color: #ff6b35; font-weight: 500; }
    .card .address { font-size: 12px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card .arrow { color: #ccc; font-size: 18px; flex-shrink: 0; }
    .empty { text-align: center; padding: 40px 20px; color: #999; }
    .empty .emoji { font-size: 48px; margin-bottom: 12px; }
    .error { text-align: center; padding: 40px 20px; color: #e74c3c; }
    .btn {
      display: inline-block; padding: 10px 24px; background: #ff6b35;
      color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
    }
    .marker-label {
      background: #fff; padding: 2px 7px; border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-size: 12px; white-space: nowrap;
      font-weight: 600; color: #ff6b35;
    }
    .debug-bar {
      background: #fff3cd; color: #856404; padding: 8px 16px;
      font-size: 12px; text-align: center; border-bottom: 1px solid #ffc107;
    }
    .debug-bar a { color: #ff6b35; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="title">附近美食</h1>
    <p id="subtitle">初始化中...</p>
  </div>
  <div id="map"></div>
  <div class="debug-bar" id="debugBar" style="display:none;">
    <span id="debugMsg"></span>
  </div>
  <div class="list" id="list">
    <div class="empty">
      <div class="emoji">📍</div>
      <p id="listMsg">加载中...</p>
    </div>
  </div>

  <script>
    var AMAP_KEY = '7d3a1e74b331280d4261b104d9d686b7';
    window._AMapSecurityConfig = { securityJsCode: '' };
  </script>
  <!-- 只加载基础地图，不加载任何插件 -->
  <script src="https://webapi.amap.com/maps?v=2.0&key=7d3a1e74b331280d4261b104d9d686b7"></script>
  <script>
    var map, placeSearch, markers = [];
    var _lng, _lat, _located = false;

    function $(id) { return document.getElementById(id); }

    function status(text) {
      $('subtitle').textContent = text;
      $('listMsg').textContent = text;
    }

    function debug(text) {
      $('debugBar').style.display = '';
      $('debugMsg').textContent = text;
      console.log('[DEBUG]', text);
    }

    var cuisineIcons = {
      '中餐': '🥢', '火锅': '🫕', '烧烤': '🍖', '面馆': '🍜', '面条': '🍜',
      '小吃': '🍢', '快餐': '🍔', '汉堡': '🍔', '炸鸡': '🍗',
      '日本': '🍣', '日料': '🍣', '寿司': '🍣', '韩国': '🇰🇷', '韩式': '🇰🇷',
      '西餐': '🥩', '牛排': '🥩', '咖啡': '☕', '茶': '🍵',
      '海鲜': '🦐', '串串': '🍡', '麻辣烫': '🌶️', '自助': '🍽️',
      '面包': '🥐', '蛋糕': '🍰', '甜品': '🍰', '冰淇淋': '🍦', '披萨': '🍕',
      '饺子': '🥟', '粤菜': '🥘', '川菜': '🌶️', '湘菜': '🌶️', '新疆': '🍖',
    };

    function getIcon(type) {
      var t = type || '';
      for (var k in cuisineIcons) { if (t.indexOf(k) !== -1) return { icon: cuisineIcons[k], bg: '#fff5f0' }; }
      return { icon: '🍴', bg: '#fff5f0' };
    }

    function renderList(pois) {
      var list = $('list');
      if (!pois || pois.length === 0) {
        list.innerHTML = '<div class="empty"><div class="emoji">😔</div><p>10km 内没有搜到美食</p></div>';
        return;
      }
      for (var i = 0; i < markers.length; i++) markers[i].setMap(null);
      markers = [];
      list.innerHTML = '';

      for (var i = 0; i < pois.length; i++) {
        (function(p, idx) {
          var ig = getIcon(p.type);
          var dist = p.distance < 1000 ? p.distance + 'm' : (p.distance / 1000).toFixed(1) + 'km';

          var m = new AMap.Marker({
            position: [p.lng, p.lat],
            content: '<div class="marker-label">' + (idx + 1) + '</div>',
            offset: new AMap.Pixel(-14, -14),
          });
          m.setMap(map);
          m.on('click', function() {
            new AMap.InfoWindow({
              content: '<div style="padding:4px;"><b>' + p.name + '</b><br>' + (p.type || '美食') + '<br>⭐ ' + p.rating + ' | 📍 ' + dist + '<br><span style="color:#999;font-size:12px;">' + (p.address || '') + '</span></div>',
              offset: new AMap.Pixel(0, -30),
            }).open(map, [p.lng, p.lat]);
            map.setZoomAndCenter(16, [p.lng, p.lat]);
          });
          markers.push(m);

          var card = document.createElement('div');
          card.className = 'card';
          card.innerHTML =
            '<div class="icon" style="background:' + ig.bg + '">' + ig.icon + '</div>' +
            '<div class="info">' +
              '<div class="name">' + (idx + 1) + '. ' + p.name + '</div>' +
              '<div class="type">' + (p.type || '美食') + '</div>' +
              '<div class="rating">⭐ ' + p.rating + '</div>' +
              '<div class="meta">' +
                '<span class="distance">📍 ' + dist + '</span>' +
                '<span class="address">' + (p.address || '') + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="arrow">›</div>';
          card.addEventListener('click', function() { map.setZoomAndCenter(16, [p.lng, p.lat]); });
          list.appendChild(card);
        })(pois[i], i);
      }
    }

    function markUser(lng, lat) {
      new AMap.Marker({
        position: [lng, lat],
        content: '<div style="width:20px;height:20px;background:#4285f4;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(66,133,244,0.6);"></div>',
        offset: new AMap.Pixel(-10, -10),
        zIndex: 100,
      }).setMap(map);
      new AMap.Circle({
        center: [lng, lat], radius: 10000,
        strokeColor: '#ff6b35', strokeWeight: 1, strokeOpacity: 0.3,
        fillColor: '#ff6b35', fillOpacity: 0.05,
      }).setMap(map);
    }

    // ===== 核心：使用 AMap.plugin 显式加载 PlaceSearch =====
    function doSearch(lng, lat) {
      status('正在加载搜索组件...');
      debug('AMap.plugin 加载 PlaceSearch...');

      AMap.plugin('AMap.PlaceSearch', function() {
        debug('PlaceSearch 插件加载完成，开始搜索');
        status('正在搜索美食...');

        placeSearch = new AMap.PlaceSearch({ pageSize: 50, pageIndex: 1, extensions: 'all' });
        placeSearch.setLocation([lng, lat]);
        placeSearch.setRadius(10000);

        $('list').innerHTML = '<div class="empty"><div class="emoji">🔍</div><p>正在搜索...</p></div>';

        // 搜索 + 超时保护
        var searchDone = false;
        var searchTimer = setTimeout(function() {
          if (searchDone) return;
          searchDone = true;
          debug('搜索超时（15秒），请检查 Key 白名单是否包含当前域名');
          status('搜索超时，请检查 Key 配置');
          $('list').innerHTML = '<div class="error"><p>❌ 搜索超时</p><p style="font-size:13px;margin-top:8px;">请确认高德 Key 白名单已添加当前域名</p><button class="btn" onclick="location.reload()" style="margin-top:12px;">重新加载</button></div>';
        }, 15000);

        placeSearch.search('美食', function(status, result) {
          if (searchDone) return;
          searchDone = true;
          clearTimeout(searchTimer);

          debug('搜索回调: status=' + status + ', pois=' + (result && result.poiList ? result.poiList.pois.length : '0'));
          console.log('PlaceSearch result:', status, result);

          if (status === 'complete' && result && result.poiList && result.poiList.pois.length > 0) {
            var pois = [];
            for (var i = 0; i < result.poiList.pois.length; i++) {
              if (result.poiList.pois[i].distance <= 10000) {
                pois.push(result.poiList.pois[i]);
              }
            }
            pois.sort(function(a, b) { return a.distance - b.distance; });
            pois = pois.slice(0, 50);

            if (pois.length === 0) {
              renderList([]);
              status('10km 内没有找到餐厅');
              return;
            }
            renderList(pois);
            status('找到 ' + pois.length + ' 家美食');
            $('title').textContent = '附近美食 (' + pois.length + '家)';
          } else if (status === 'no_data') {
            renderList([]);
            status('此区域暂无餐厅数据');
          } else {
            debug('搜索失败: ' + JSON.stringify(result));
            $('list').innerHTML = '<div class="error"><p>❌ 搜索失败</p><p style="font-size:13px;margin-top:8px;">' + (result && result.message || '未知错误') + '</p><button class="btn" onclick="location.reload()" style="margin-top:12px;">重新加载</button></div>';
            status('搜索失败');
          }
        });
      });
    }

    // ===== 定位 =====
    function tryGPS() {
      if (!navigator.geolocation) { fallbackIP(); return; }

      status('正在GPS定位...');
      debug('尝试浏览器GPS定位...');
      var settled = false;

      var timer = setTimeout(function() {
        if (settled) return;
        settled = true;
        debug('GPS超时(8s)，降级IP定位');
        fallbackIP();
      }, 8000);

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          if (settled) return;
          settled = true; clearTimeout(timer);
          _lng = pos.coords.longitude; _lat = pos.coords.latitude;
          debug('GPS成功: ' + _lng.toFixed(4) + ',' + _lat.toFixed(4));
          _located = true;
          status('已定位，搜索中...');
          map.setZoomAndCenter(14, [_lng, _lat]);
          markUser(_lng, _lat);
          doSearch(_lng, _lat);
        },
        function(err) {
          if (settled) return;
          settled = true; clearTimeout(timer);
          debug('GPS失败: code=' + err.code);
          fallbackIP();
        },
        { enableHighAccuracy: true, timeout: 7000, maximumAge: 120000 }
      );
    }

    function fallbackIP() {
      debug('尝试IP城市定位...');
      AMap.plugin('AMap.CitySearch', function() {
        var cs = new AMap.CitySearch();
        cs.getLocalCity(function(status, result) {
          if (status === 'complete' && result && result.info === 'OK' && result.rectangle) {
            var parts = result.rectangle.split(';')[0].split(',');
            _lng = parseFloat(parts[0]); _lat = parseFloat(parts[1]);
            debug('IP定位: ' + (result.city || '') + ' ' + _lng.toFixed(4) + ',' + _lat.toFixed(4));
            status('已定位到' + (result.city || '当前城市') + '（IP定位）');
            map.setZoomAndCenter(12, [_lng, _lat]);
            markUser(_lng, _lat);
            doSearch(_lng, _lat);
          } else {
            debug('IP定位失败，使用默认位置');
            _lng = 116.3974; _lat = 39.9092;
            status('使用默认位置（北京）');
            map.setZoomAndCenter(12, [_lng, _lat]);
            markUser(_lng, _lat);
            doSearch(_lng, _lat);
          }
        });
      });
    }

    // ===== 主入口 =====
    function init() {
      debug('AMap脚本加载完成，初始化地图...');
      map = new AMap.Map('map', { zoom: 12, center: [116.3974, 39.9092], resizeEnable: true });
      map.addControl(new AMap.Scale());
      debug('地图已创建');
      tryGPS();
    }

    init();
  </script>
</body>
</html>
