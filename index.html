<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>附近美食</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f5; }
    #map { width: 100%; height: 55vh; }
    .header {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      color: #fff; padding: 16px 20px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; opacity: 0.9; margin-top: 4px; }
    .status-bar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px; background: #fff; font-size: 13px; color: #666;
      border-bottom: 1px solid #eee;
    }
    .spinner {
      width: 16px; height: 16px; border: 2px solid #ddd;
      border-top-color: #ff6b35; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .list { padding: 12px 16px; overflow-y: auto; max-height: calc(45vh - 100px); }
    .card {
      background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex; gap: 12px; align-items: center; cursor: pointer;
      transition: transform 0.15s;
    }
    .card:active { transform: scale(0.98); }
    .card .icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .card .info { flex: 1; min-width: 0; }
    .card .name { font-size: 16px; font-weight: 600; color: #222; }
    .card .type { font-size: 12px; color: #999; margin-top: 2px; }
    .card .rating { font-size: 12px; color: #f5a623; margin-top: 2px; }
    .card .meta { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    .card .distance { font-size: 13px; color: #ff6b35; font-weight: 500; }
    .card .address { font-size: 12px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card .arrow { color: #ccc; font-size: 18px; flex-shrink: 0; }
    .empty { text-align: center; padding: 40px 20px; color: #999; }
    .empty .emoji { font-size: 48px; margin-bottom: 12px; }
    .error { text-align: center; padding: 40px 20px; color: #e74c3c; }
    .btn {
      display: inline-block; padding: 10px 24px; background: #ff6b35;
      color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
    }
    .marker-label {
      background: #fff; padding: 2px 7px; border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-size: 12px; white-space: nowrap;
      font-weight: 600; color: #ff6b35;
    }
    .no-geo-banner {
      background: #fff3cd; color: #856404; padding: 8px 16px;
      font-size: 12px; text-align: center; border-bottom: 1px solid #ffc107;
    }
    .no-geo-banner a { color: #ff6b35; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>附近美食</h1>
    <p id="subtitle">正在准备...</p>
  </div>
  <!-- 地图会立即渲染，不依赖任何异步 -->
  <div id="map"></div>
  <!-- 定位提示条（默认隐藏） -->
  <div class="no-geo-banner" id="noGeoBanner" style="display:none;">
    ⚠️ 未获取到精确位置，当前显示 <b id="cityName">附近</b> 的结果。
    <a onclick="retryGeo()">点击重试定位</a>
  </div>
  <div class="status-bar" id="statusBar">
    <div class="spinner" id="spinner"></div>
    <span id="statusText">正在初始化地图...</span>
  </div>
  <div class="list" id="list">
    <div class="empty">
      <div class="emoji">📍</div>
      <p>初始化中...</p>
    </div>
  </div>

  <script>
    // ===== 配置 =====
    var AMAP_KEY = '7d3a1e74b331280d4261b104d9d686b7';
    window._AMapSecurityConfig = { securityJsCode: '' };
  </script>
  <!-- 常规 script 标签加载，不搞动态加载那一套 -->
  <script src="https://webapi.amap.com/maps?v=2.0&key=7d3a1e74b331280d4261b104d9d686b7&plugin=AMap.PlaceSearch,AMap.Scale,AMap.Geolocation,AMap.CitySearch"></script>
  <script>
    var map, placeSearch, citySearch, geolocation;
    var markers = [];
    var userLocated = false;

    function $(id) { return document.getElementById(id); }

    var cuisineIcons = {
      '中餐': '🥢', '火锅': '🫕', '烧烤': '🍖', '面馆': '🍜', '面条': '🍜',
      '小吃': '🍢', '快餐': '🍔', '汉堡': '🍔', '炸鸡': '🍗',
      '日本': '🍣', '日料': '🍣', '寿司': '🍣', '韩国': '🇰🇷', '韩式': '🇰🇷',
      '西餐': '🥩', '牛排': '🥩', '咖啡': '☕', '茶': '🍵',
      '海鲜': '🦐', '串串': '🍡', '麻辣烫': '🌶️', '自助': '🍽️',
      '面包': '🥐', '蛋糕': '🍰', '甜品': '🍰', '冰淇淋': '🍦', '披萨': '🍕',
      '饺子': '🥟', '粤菜': '🥘', '川菜': '🌶️', '湘菜': '🌶️', '新疆': '🍖',
    };

    function updateStatus(text, showSpinner) {
      $('statusText').textContent = text;
      $('spinner').style.display = showSpinner ? '' : 'none';
    }

    function getIcon(type) {
      var t = type || '';
      for (var key in cuisineIcons) {
        if (t.indexOf(key) !== -1) return { icon: cuisineIcons[key], bg: '#fff5f0' };
      }
      return { icon: '🍴', bg: '#fff5f0' };
    }

    function clearMarkers() {
      for (var i = 0; i < markers.length; i++) markers[i].setMap(null);
      markers = [];
    }

    function renderList(pois) {
      var list = $('list');
      if (pois.length === 0) {
        list.innerHTML = '<div class="empty"><div class="emoji">😔</div><p>10km 内没有搜到美食</p></div>';
        return;
      }
      clearMarkers();
      list.innerHTML = '';

      for (var i = 0; i < pois.length; i++) {
        (function(p, idx) {
          var ig = getIcon(p.type);
          var dist = p.distance < 1000 ? p.distance + 'm' : (p.distance / 1000).toFixed(1) + 'km';

          var marker = new AMap.Marker({
            position: [p.lng, p.lat],
            content: '<div class="marker-label">' + (idx + 1) + '</div>',
            offset: new AMap.Pixel(-14, -14),
          });
          marker.setMap(map);
          marker.on('click', function() {
            new AMap.InfoWindow({
              content: '<div style="padding:4px;"><b>' + p.name + '</b><br>' + (p.type || '美食') + '<br>⭐ ' + p.rating + ' | 📍 ' + dist + '<br><span style="color:#999;font-size:12px;">' + (p.address || '') + '</span></div>',
              offset: new AMap.Pixel(0, -30),
            }).open(map, [p.lng, p.lat]);
            map.setZoomAndCenter(16, [p.lng, p.lat]);
          });
          markers.push(marker);

          var card = document.createElement('div');
          card.className = 'card';
          card.innerHTML =
            '<div class="icon" style="background:' + ig.bg + '">' + ig.icon + '</div>' +
            '<div class="info">' +
              '<div class="name">' + (idx + 1) + '. ' + p.name + '</div>' +
              '<div class="type">' + (p.type || '美食') + '</div>' +
              '<div class="rating">⭐ ' + p.rating + '</div>' +
              '<div class="meta">' +
                '<span class="distance">📍 ' + dist + '</span>' +
                '<span class="address">' + (p.address || '') + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="arrow">›</div>';
          card.addEventListener('click', function() {
            map.setZoomAndCenter(16, [p.lng, p.lat]);
          });
          list.appendChild(card);
        })(pois[i], i);
      }
    }

    function doSearch(lng, lat) {
      updateStatus('正在搜索美食...', true);
      $('list').innerHTML = '<div class="empty"><div class="emoji">🔍</div><p>正在搜索...</p></div>';

      if (!placeSearch) {
        placeSearch = new AMap.PlaceSearch({ pageSize: 50, pageIndex: 1, extensions: 'all' });
      }
      placeSearch.setLocation([lng, lat]);
      placeSearch.setRadius(10000);

      // PlaceSearch 不支持并发调用，每次调用会取消上一次。
      // 改用单个关键词"美食"，高德 POI 分类中"美食"涵盖餐饮全品类。
      placeSearch.search('美食', function(status, result) {
        if (status === 'complete' && result && result.poiList) {
          var pois = result.poiList.pois.filter(function(p) { return p.distance <= 10000; });
          pois.sort(function(a, b) { return a.distance - b.distance; });
          pois = pois.slice(0, 50);

          if (pois.length === 0) {
            renderList([]);
            updateStatus('未找到结果', false);
            $('subtitle').textContent = '10km 内没有搜到美食';
            return;
          }
          renderList(pois);
          updateStatus('找到 ' + pois.length + ' 家', false);
          $('subtitle').textContent = '周围 10km 共 ' + pois.length + ' 家';
        } else {
          renderList([]);
          updateStatus('搜索失败', false);
          $('subtitle').textContent = '搜索失败，请确认高德 Key 白名单已添加 chui2.github.io';
        }
      });
    }

    function markUser(lng, lat) {
      new AMap.Marker({
        position: [lng, lat],
        content: '<div style="width:20px;height:20px;background:#4285f4;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(66,133,244,0.6);"></div>',
        offset: new AMap.Pixel(-10, -10),
        zIndex: 100,
      }).setMap(map);
      new AMap.Circle({
        center: [lng, lat],
        radius: 10000,
        strokeColor: '#ff6b35',
        strokeWeight: 1,
        strokeOpacity: 0.3,
        fillColor: '#ff6b35',
        fillOpacity: 0.05,
      }).setMap(map);
    }

    function onPosition(lng, lat, source) {
      userLocated = true;
      $('noGeoBanner').style.display = 'none';
      $('subtitle').textContent = '已定位，正在搜索...';
      updateStatus('已定位 (' + lng.toFixed(4) + ', ' + lat.toFixed(4) + ') [' + source + ']', false);
      map.setZoomAndCenter(14, [lng, lat]);
      markUser(lng, lat);
      doSearch(lng, lat);
    }

    function useIPCity() {
      updateStatus('使用IP城市定位...', true);
      citySearch.getLocalCity(function(status, result) {
        if (status === 'complete' && result && result.info === 'OK' && result.rectangle) {
          // rectangle 格式: "lng1,lat1;lng2,lat2"
          var parts = result.rectangle.split(';')[0].split(',');
          var lng = parseFloat(parts[0]), lat = parseFloat(parts[1]);
          $('noGeoBanner').style.display = '';
          $('cityName').textContent = result.city || '该城市';
          $('subtitle').textContent = '已定位到 ' + (result.city || '当前城市') + '（IP定位）';
          updateStatus('使用 ' + (result.city || 'IP定位') + ' 的中心位置', false);
          map.setZoomAndCenter(12, [lng, lat]);
          markUser(lng, lat);
          doSearch(lng, lat);
        } else {
          // 终极兜底：北京天安门
          var defLng = 116.3974, defLat = 39.9092;
          $('noGeoBanner').style.display = '';
          $('cityName').textContent = '默认位置';
          $('subtitle').textContent = '无法定位，使用默认位置';
          updateStatus('使用默认位置（北京）', false);
          map.setZoomAndCenter(12, [defLng, defLat]);
          markUser(defLng, defLat);
          doSearch(defLng, defLat);
        }
      });
    }

    function tryGPS() {
      if (!navigator.geolocation) {
        useIPCity();
        return;
      }
      updateStatus('获取GPS位置...', true);

      var settled = false;
      function settle(lng, lat, src) {
        if (settled) return;
        settled = true;
        if (timer) clearTimeout(timer);
        onPosition(lng, lat, src);
      }

      var timer = setTimeout(function() {
        // GPS 8 秒没反应，降级到 IP 定位
        if (settled) return;
        settled = true;
        updateStatus('GPS超时，尝试IP定位...', true);
        useIPCity();
      }, 8000);

      navigator.geolocation.getCurrentPosition(
        function(pos) { settle(pos.coords.longitude, pos.coords.latitude, 'GPS'); },
        function(err) {
          if (settled) return;
          settled = true;
          if (timer) clearTimeout(timer);
          updateStatus('GPS失败，尝试IP定位...', true);
          useIPCity();
        },
        { enableHighAccuracy: true, timeout: 7000, maximumAge: 120000 }
      );
    }

    function retryGeo() {
      $('noGeoBanner').style.display = 'none';
      tryGPS();
    }

    // ===== 主入口：AMap 脚本加载完成后立即执行 =====
    function init() {
      updateStatus('初始化地图...', true);

      // 1. 创建地图（立即可见）
      map = new AMap.Map('map', { zoom: 12, center: [116.3974, 39.9092], resizeEnable: true });
      map.addControl(new AMap.Scale());
      $('subtitle').textContent = '地图已就绪，正在定位...';

      // 2. 初始化服务
      placeSearch = new AMap.PlaceSearch({ pageSize: 25, pageIndex: 1, extensions: 'all' });
      citySearch = new AMap.CitySearch();

      // 3. 先尝试GPS，8秒超时后降级IP定位
      tryGPS();
    }

    // AMap 脚本加载即执行
    init();
  </script>
</body>
</html>
